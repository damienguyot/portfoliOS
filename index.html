<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damien GUYOT - portfoliOS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #scanlines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 2px, transparent 2px, transparent 4px);
    pointer-events: none; z-index: 11;
  }
  #loader {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 999;
    transition: opacity 1.6s ease;
    pointer-events: all;
  }
  #loader.fade { opacity: 0; pointer-events: none; }
  #phone-interstitial {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.8s ease;
    pointer-events: none;
  }
  #phone-interstitial.show { opacity: 1; pointer-events: all; }
  #phone-interstitial.fadeout { opacity: 0; pointer-events: none; transition: opacity 1s ease; }
  .phone-msg {
    text-align: center; padding: 40px 24px; max-width: 340px;
  }
  .phone-msg p {
    color: #aaa; font-size: 15px; line-height: 1.6; margin-bottom: 32px;
  }
  .phone-msg button {
    background: none; border: 1.5px solid #fff; color: #fff;
    font: 15px "Courier New", monospace; padding: 12px 32px;
    cursor: pointer; letter-spacing: 1px;
  }
  .phone-msg button:hover { background: #fff; color: #000; }
  .swipe-demo {
    display: block; width: 160px; margin: 0 auto 24px auto;
    border-radius: 6px; opacity: 0.8; background: #000;
  }
</style>
</head>
<body>
<div id="loader"></div>
<div id="phone-interstitial">
  <div class="phone-msg">
    <p>Ce portfolio a été conçu et optimisé pour une expérience optimale sur ordinateur. Des gestes tactiles ont été implémentés pour faciliter la navigation.</p>
    <img src="swipe.gif" alt="swipe gesture" class="swipe-demo">
    <button id="phone-ack">Je comprends</button>
  </div>
</div>
<div id="scanlines"></div>
<div id="vignette"></div>


<script type="module" src="main.js"></script>
</body>
</html>
